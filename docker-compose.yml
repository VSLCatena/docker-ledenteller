
networks:
  REVERSE_PROXY:
    external: true

volumes:
  data:
    driver: local

services:
  ledenteller.php:
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${PROJECT_TRAEFIK_NETWORK}"
      - "traefik.http.routers.${PROJECT}.tls=true"
      - "traefik.http.routers.${PROJECT}.rule=Host(`${PROJECT_FQDN}`) || Host(`${PROJECT_FQDN2}`)"
      - "traefik.http.routers.${PROJECT}.entrypoints=${PROJECT_ENTRYPOINT}"
      - "traefik.http.routers.${PROJECT}.tls.domains[0].main=${PROJECT_DOMAIN_MAIN}"
      - "traefik.http.routers.${PROJECT}.tls.domains[0].sans=${PROJECT_DOMAIN_SANS}"
      - "traefik.http.routers.${PROJECT}.tls.certresolver=${PROJECT_CERT_RESOLVER}"
      - "traefik.http.routers.${PROJECT}.middlewares=${PROJECT_MIDDLEWARES}"
      - "traefik.http.services.${PROJECT}.loadbalancer.server.port=80"
    container_name: ledenteller.php
    hostname: php
    image: 'ghcr.io/vslcatena/docker-ledenteller:latest'
    pull_policy: if_not_present
    build:
      context: ./src
      dockerfile: Dockerfile
    environment:
      TZ: 'Europe/Amsterdam'
      LOGIN_INFORMATION: ${LOGIN_INFORMATION}
      USE_USERNAME: ${USE_USERNAME:-0}
      LOGOUT_URL: ${LOGOUT_URL:-"about://blank"}
      TIMEOUT_MINUTES: ${TIMEOUT_MINUTES:-30}
      TIMEOUT_CHECK_ACTIVITY: ${TIMEOUT_CHECK_ACTIVITY:-1}
    restart: unless-stopped
    tty: true
  #  ports:
 #     - '${PROJECT_IP:-0.0.0.0}:${PROJECT_PORT:-8128}:80'
    volumes:
      - '/etc/localtime:/etc/localtime:ro'
      - data:/var/www/html/data
    networks:
      - REVERSE_PROXY
